services:
  - type: web
    name: codexgo-backend
    runtime: node
    rootDir: backend
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5-codex
      - key: GOVERNOR_USE_MODEL_SUMMARY
        value: "false"
      - key: BACKEND_PORT
        value: "4000"
    disk:
      name: codexgo-backend-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1

  - type: web
    name: codexgo-frontend
    runtime: node
    rootDir: frontend
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false
